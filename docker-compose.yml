services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: streak
      MYSQL_USER: ureca
      MYSQL_PASSWORD: ureca
    ports:
      - "3306:3306"
    volumes:
      - streak-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uureca", "-pureca"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/streak?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ureca
      SPRING_DATASOURCE_PASSWORD: ureca
    ports:
      - "8080:8080"

volumes:
  streak-mysql-data:
